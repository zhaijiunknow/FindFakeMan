reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbit summary"
  review_status: true
  collapse_walkthrough: false
  poem: false
  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - "Assets/**"
    - "Packages/**"
    - "ProjectSettings/**"
    - "!Library/**"
    - "!Logs/**"
    - "!Temp/**"
    - "!obj/**"

  path_instructions:
    - path: "Assets/**/*.asset"
      instructions: |
        This is a Unity asset file. Review for broken YAML references, invalid GUID/fileID pairs,
        invalid m_Script pointers, accidental hand-edited asset corruption, and data integrity issues.
        Be especially alert to placeholder GUIDs, broken text PPtrs, and ScriptableObject asset references
        that do not match the script's .meta GUID.

    - path: "Assets/**/*.meta"
      instructions: |
        Review .meta changes carefully. Flag accidental GUID churn, deleted meta files, duplicated GUID risks,
        or unrelated asset identity changes. .meta integrity is high priority in this repository.

    - path: "ProjectSettings/**"
      instructions: |
        Treat ProjectSettings changes as high-risk and verify they are intentional and directly related to the task.
        Flag unrelated build, input, package, rendering, or editor setting changes.

    - path: "Assets/Project/Core/Scripts/Runtime/Framework/**/*.cs"
      instructions: |
        This folder contains shared runtime framework code. These files are exempt from the repository namespace requirement.
        Review for:
        - save/load symmetry
        - GameState correctness
        - serialization compatibility
        - breaking changes to shared enums or save data
        - unintended impact on manager coordination

    - path: "Assets/Project/Core/Scripts/Runtime/Managers/**/*.cs"
      instructions: |
        This folder contains central runtime managers registered through the Services registry.
        These files are exempt from the repository namespace requirement.
        Review for:
        - incorrect manager lifecycle assumptions
        - missing TryGet/Get safety
        - state transition bugs
        - pause/resume mismatches
        - new persistent state not integrated with SaveManager
        - duplicated responsibility between managers

    - path: "Assets/Project/Narrative/**/*.cs"
      instructions: |
        This folder contains the visual novel framework.
        These files are exempt from the repository namespace requirement.
        Review for:
        - incorrect narrative node execution order
        - condition checks happening after side effects
        - flag writes happening in the wrong order
        - invalid or dead-end node/sequence jumps
        - duplicate IDs
        - save/load restoration bugs
        - stuck states involving auto-continue, choice waiting, or external signal waiting
        - runtime mutation of ScriptableObject authoring data

    - path: "Assets/Project/Narrative/**/*.asset"
      instructions: |
        These are narrative data assets. Review for:
        - broken m_Script references
        - duplicate chapter/sequence/node/choice IDs
        - invalid targetSequenceId / targetNodeId references
        - missing required fields that would cause runtime-only failures
        - asset data that appears to encode runtime state instead of authoring/configuration state

    - path: "Assets/Project/Gameplay/**/*.cs"
      instructions: |
        Review gameplay code for consistency with manager-driven architecture.
        Gameplay scripts should use an explicit namespace.
        Flag any new or modified script without a namespace declaration.
        Exemptions: manager scripts, base/shared framework scripts, and the visual novel system.
        Also flag direct runtime mutation of ScriptableObject config assets, missing save/load implications,
        and interaction logic that bypasses GameManager/UIManager/InteractionManager patterns.

    - path: "Assets/**/*.cs"
      instructions: |
        Repository convention: except for manager scripts, shared base/framework scripts,
        and the visual novel system, all C# scripts should use an explicit namespace.
        Flag new or modified scripts that omit a namespace unless they clearly belong to an exempt category.

chat:
  auto_reply: false

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/*.cs"
      - "**/*.asset"
      - "**/*.meta"
      - "ProjectSettings/**"

  learnings:
    scope: auto

  issues:
    scope: auto

language: en-US

tone_instructions: |
  Be concise and technical. Prioritize correctness over style.
  Focus on Unity asset integrity, save/load consistency, VN flow safety,
  state transitions, and missing namespaces in non-exempt scripts.
