reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbit summary"
  review_status: true
  collapse_walkthrough: false
  poem: false
  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - "Assets/**"
    - "Packages/**"
    - "ProjectSettings/**"
    - "!Assets/**/*.meta"
    - "!Library/**"
    - "!Logs/**"
    - "!Temp/**"
    - "!obj/**"

  path_instructions:
    - path: "Assets/**/*.asset"
      instructions: |
        这是一个 Unity 资源文件。请检查是否存在损坏的 YAML 引用、无效的 GUID/fileID 配对、
        无效的 m_Script 指针、意外的手工编辑导致的资源损坏，以及数据完整性问题。
        特别注意占位 GUID、损坏的文本 PPtr，以及与脚本 .meta GUID 不匹配的
        ScriptableObject 资源引用。

    - path: "Assets/**/*.meta"
      instructions: |
        请仔细审查 .meta 变更。标记意外的 GUID 变动、被删除的 meta 文件、重复 GUID 风险，
        或无关的资源身份变更。在此仓库中，.meta 完整性属于高优先级事项。

    - path: "ProjectSettings/**"
      instructions: |
        将 ProjectSettings 变更视为高风险内容，并确认这些变更是有意为之且与当前任务直接相关。
        标记无关的构建、输入、包、渲染或编辑器设置改动。

    - path: "Assets/Project/Core/Scripts/Runtime/Framework/**/*.cs"
      instructions: |
        此目录包含共享运行时框架代码。这些文件不受仓库命名空间要求限制。
        请检查：
        - 保存/加载对称性
        - GameState 正确性
        - 序列化兼容性
        - 对共享枚举或存档数据的破坏性修改
        - 对管理器协作的非预期影响

    - path: "Assets/Project/Core/Scripts/Runtime/Managers/**/*.cs"
      instructions: |
        此目录包含通过 Services 注册表注册的核心运行时管理器。
        这些文件不受仓库命名空间要求限制。
        请检查：
        - 错误的管理器生命周期假设
        - 缺失的 TryGet/Get 安全性
        - 状态转换缺陷
        - 暂停/恢复不一致
        - 新增持久化状态未接入 SaveManager
        - 管理器之间职责重复

    - path: "Assets/Project/Narrative/**/*.cs"
      instructions: |
        此目录包含视觉小说框架。
        这些文件不受仓库命名空间要求限制。
        请检查：
        - 叙事节点执行顺序错误
        - 条件检查发生在副作用之后
        - 标记写入顺序错误
        - 无效或走不通的节点/序列跳转
        - 重复 ID
        - 保存/加载恢复缺陷
        - 自动继续、等待选项或等待外部信号相关的卡死状态
        - 对 ScriptableObject 作者数据的运行时修改

    - path: "Assets/Project/Narrative/**/*.asset"
      instructions: |
        这些是叙事数据资源。请检查：
        - 损坏的 m_Script 引用
        - 重复的 chapter/sequence/node/choice ID
        - 无效的 targetSequenceId / targetNodeId 引用
        - 可能导致仅在运行时报错的必填字段缺失
        - 看起来把运行时状态编码进资源数据，而不是作者/配置状态的数据

    - path: "Assets/Project/Gameplay/**/*.cs"
      instructions: |
        请检查玩法代码是否与管理器驱动架构保持一致。
        玩法脚本应使用显式命名空间。
        标记任何新增或修改但未声明命名空间的脚本。
        例外：管理器脚本、基础/共享框架脚本，以及视觉小说系统。
        同时标记对 ScriptableObject 配置资源的直接运行时修改、缺失的保存/加载影响，
        以及绕过 GameManager/UIManager/InteractionManager 模式的交互逻辑。

    - path: "Assets/**/*.cs"
      instructions: |
        仓库约定：除管理器脚本、共享基础/框架脚本，以及视觉小说系统外，
        所有 C# 脚本都应使用显式命名空间。
        标记新增或修改但缺少命名空间的脚本，除非它明显属于例外类别。

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/*.cs"
      - "**/*.asset"
      - "**/*.meta"
      - "ProjectSettings/**"

  learnings:
    scope: auto

  issues:
    scope: auto

language: zh-CN

tone_instructions: |
  保持简明和技术性。优先保证正确性而非风格。
  关注 Unity 资源完整性、存储/加载一致性、视觉小说流程安全、状态转换，
  以及非例外脚本中缺失的命名空间。
